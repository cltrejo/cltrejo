name: Sakura Garden

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sakura-garden.yml"
      - "scripts/generate-sakura-garden.mjs"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate custom sakura garden
        run: node scripts/generate-sakura-garden.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SAKURA_USERNAME: cltrejo

      - name: Publish SVGs
        run: |
          cp dist/sakura-garden.svg assets/sakura-garden.svg
          cp dist/sakura-garden-dark.svg assets/sakura-garden-dark.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/sakura-garden.svg assets/sakura-garden-dark.svg
          git diff --cached --quiet || git commit -m "Update sakura garden"
          git push
